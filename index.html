<!DOCTYPE html>
<html>
<head>
  <title>Looply</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f2f2f2;
    }

    .sidebar {
      width: 180px;
      height: 100vh;
      background: #111;
      color: white;
      padding: 10px;
      position: fixed;
    }

    .menu {
      padding: 10px;
      background: #222;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 5px;
    }

    .main {
      margin-left: 190px;
      width: 100%;
      padding: 10px;
    }

    .page {
      display: none;
    }

    .active {
      display: block;
    }

    .post {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .btn {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      border-radius: 5px;
      background: #eee;
    }

    .liked {
      background: #ffd6d6;
    }

    .followed {
      background: #d6e6ff;
    }

    .comment {
      font-size: 12px;
      background: #eee;
      padding: 5px;
      margin-top: 5px;
      border-radius: 5px;
    }

    .usernameLock {
      font-size: 12px;
      color: gray;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Looply</h2>
  <div class="menu" onclick="show('explore')">Explore</div>
  <div class="menu" onclick="show('create')">Create</div>
  <div class="menu" onclick="show('following')">Following</div>
</div>

<div class="main">

  <!-- EXPLORE -->
  <div id="explore" class="page active">
    <h2>Explore</h2>
    <div id="feed"></div>
  </div>

  <!-- CREATE -->
  <div id="create" class="page">
    <h2>Create Post</h2>

    <div class="usernameLock" id="userStatus"></div>

    <input id="user" placeholder="Username">
    <input id="text" placeholder="What's looping?">
    <input id="img" placeholder="Image URL (optional)">
    <button onclick="saveUser()">Set Username</button>
    <button onclick="post()">Post</button>
  </div>

  <!-- FOLLOWING -->
  <div id="following" class="page">
    <h2>Following Feed</h2>
    <div id="followFeed"></div>
  </div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts") || "[]");
let currentUser = localStorage.getItem("user") || "";
let following = JSON.parse(localStorage.getItem("following") || "[]");

/* SET USERNAME (LOCKED) */
function saveUser(){
  if(!currentUser){
    currentUser = user.value.trim();
    if(!currentUser) return;

    localStorage.setItem("user", currentUser);
    user.value = "";
  }

  updateUserUI();
}

/* SHOW USER STATUS */
function updateUserUI(){
  userStatus.innerText = currentUser
    ? "Logged in as: " + currentUser + " (locked)"
    : "No username set yet";
}

/* NAVIGATION */
function show(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  render();
}

/* CREATE POST */
function post(){
  if(!currentUser) return alert("Set username first!");

  let p = {
    id: Date.now(),
    user: currentUser,
    text: text.value,
    img: img.value,
    likes: 0,
    liked: false,
    comments: []
  };

  posts.unshift(p);
  save();
  render();

  text.value = "";
  img.value = "";
}

/* SAVE */
function save(){
  localStorage.setItem("posts", JSON.stringify(posts));
  localStorage.setItem("following", JSON.stringify(following));
}

/* LIKE TOGGLE */
function like(id){
  let p = posts.find(x => x.id === id);

  if(p.liked){
    p.liked = false;
    p.likes--;
  } else {
    p.liked = true;
    p.likes++;
  }

  save();
  render();
}

/* FOLLOW TOGGLE */
function follow(user){
  if(user === currentUser) return;

  if(following.includes(user)){
    following = following.filter(u => u !== user);
  } else {
    following.push(user);
  }

  save();
  render();
}

/* COMMENT */
function comment(id, textInput){
  let p = posts.find(x => x.id === id);
  if(!textInput.trim()) return;

  p.comments.unshift({
    user: currentUser,
    text: textInput
  });

  save();
  render();
}

/* RENDER (FIXED FOLLOWING SYSTEM) */
function render(){

  feed.innerHTML = "";
  followFeed.innerHTML = "";

  posts.forEach(p => {

    function makePost() {
      let el = document.createElement("div");
      el.className = "post";

      let isLiked = p.liked ? "liked" : "";
      let isFollowed = following.includes(p.user) ? "followed" : "";

      el.innerHTML = `
        <b>${p.user}</b>

        <div>${p.text}</div>
        ${p.img ? `<img src="${p.img}">` : ""}

        <div class="actions">
          <div class="btn ${isLiked}" onclick="like(${p.id})">
            ❤️ ${p.likes}
          </div>

          <div class="btn ${isFollowed}" onclick="follow('${p.user}')">
            👥 Follow
          </div>
        </div>

        <input placeholder="comment..."
          onkeydown="if(event.key==='Enter'){comment(${p.id}, this.value); this.value=''}">

        <div>
          ${p.comments.map(c =>
            `<div class="comment"><b>${c.user}:</b> ${c.text}</div>`
          ).join("")}
        </div>
      `;

      return el;
    }

    // Always show in Explore
    feed.appendChild(makePost());

    // Only show in Following if followed
    if(following.includes(p.user)){
      followFeed.appendChild(makePost());
    }
  });
}

/* INIT */
updateUserUI();
render();

</script>

</body>
</html>
