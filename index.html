<!DOCTYPE html>
<html>
<head>
  <title>Looply</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; display:flex; }

    .sidebar {
      width:180px; height:100vh; background:#111;
      padding:10px; position:fixed;
    }

    .menu {
      padding:10px; margin:10px 0;
      background:#222; border-radius:8px;
      cursor:pointer;
    }

    .main { margin-left:190px; width:100%; padding:15px; }

    .page { display:none; }
    .active { display:block; }

    .post {
      background:#1a1a1a; padding:12px;
      margin:12px 0; border-radius:12px;
    }

    input, button {
      width:100%; padding:10px;
      margin-top:6px; border-radius:6px;
      border:none;
    }

    button { background:#ff2d55; color:white; cursor:pointer; }

    img { max-width:100%; border-radius:10px; margin-top:10px; }

    .btn { padding:8px; background:#333; margin-top:5px; border-radius:6px; cursor:pointer; }

    .profile {
      display:flex; gap:10px;
      align-items:center;
      margin-bottom:6px;
    }

    .avatar {
      width:30px; height:30px;
      border-radius:50%;
      background:#444;
    }

    .comment {
      font-size:12px;
      background:#222;
      padding:5px;
      margin-top:5px;
      border-radius:5px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Looply</h2>

  <div class="menu" onclick="show('login')">Login</div>
  <div class="menu" onclick="show('explore')">Explore</div>
  <div class="menu" onclick="show('following')">Following</div>
  <div class="menu" onclick="show('create')">Create</div>
</div>

<div class="main">

  <!-- LOGIN -->
  <div id="login" class="page active">
    <h2>Login</h2>

    <input id="email">
    <input id="password" type="password">

    <input id="username" placeholder="Username">
    <input id="avatarFile" type="file">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>

  <!-- EXPLORE -->
  <div id="explore" class="page">
    <h2>Explore</h2>
    <div id="feed"></div>
  </div>

  <!-- FOLLOWING -->
  <div id="following" class="page">
    <h2>Following</h2>
    <div id="followFeed"></div>
  </div>

  <!-- CREATE -->
  <div id="create" class="page">
    <h2>Create Post</h2>

    <input id="postText" placeholder="What's looping?">
    <input id="postFile" type="file">

    <button onclick="createPost()">Post</button>
  </div>

</div>

<script>

/* CONFIG */
const SUPABASE_URL = "https://vspsewltuwxtxgvvkfel.supabase.co";
const SUPABASE_KEY = "sb_publishable_uiKoJmabgcECsQkhQ_l6nA_Ll429aPH";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

/* UPLOAD IMAGE */
async function upload(file){

  let name = Date.now() + file.name;

  await client.storage.from("images").upload(name, file);

  let { data } = client.storage.from("images").getPublicUrl(name);

  return data.publicUrl;
}

/* SIGNUP */
async function signup(){

  let { data } = await client.auth.signUp({
    email: email.value,
    password: password.value
  });

  let avatarUrl = "";

  if(avatarFile.files[0]){
    avatarUrl = await upload(avatarFile.files[0]);
  }

  await client.from("profiles").insert([{
    id: data.user.id,
    username: username.value,
    avatar: avatarUrl
  }]);

  alert("Account created");
}

/* LOGIN */
async function login(){

  let res = await client.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  currentUser = res.data.user;

  show('explore');
  load();
}

/* NAV */
function show(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

/* POST */
async function createPost(){

  let u = await client.auth.getUser();

  let imgUrl = "";

  if(postFile.files[0]){
    imgUrl = await upload(postFile.files[0]);
  }

  await client.from("posts").insert([{
    user_id: u.data.user.id,
    content: postText.value,
    image: imgUrl
  }]);

  postText.value = "";
  load();
}

/* FOLLOW */
async function follow(id){

  let u = await client.auth.getUser();

  await client.from("follows").insert([{
    follower_id: u.data.user.id,
    following_id: id
  }]);

  load();
}

/* LIKE */
async function like(post){

  let u = await client.auth.getUser();

  await client.from("likes").insert([{
    user_id: u.data.user.id,
    post_id: post.id
  }]);

  load();
}

/* LOAD */
async function load(){

  let { data: posts } = await client.from("posts").select("*");
  let { data: profiles } = await client.from("profiles").select("*");
  let { data: likes } = await client.from("likes").select("*");
  let { data: follows } = await client.from("follows").select("*");
  let { data: comments } = await client.from("comments").select("*");

  render(posts||[], profiles||[], likes||[], follows||[], comments||[]);
}

/* RENDER */
function render(posts, profiles, likes, follows, comments){

  feed.innerHTML = "";
  followFeed.innerHTML = "";

  let uid = currentUser?.id;

  let following = follows
    .filter(f=>f.follower_id===uid)
    .map(f=>f.following_id);

  posts.forEach(p=>draw(p, profiles, likes, comments, feed));

  posts
    .filter(p=>following.includes(p.user_id))
    .forEach(p=>draw(p, profiles, likes, comments, followFeed));
}

/* DRAW */
function draw(p, profiles, likes, comments, container){

  let prof = profiles.find(x=>x.id===p.user_id);

  let el = document.createElement("div");
  el.className="post";

  el.innerHTML = `
    <div class="profile">
      <div class="avatar" style="background-image:url('${prof?.avatar}'); background-size:cover;"></div>
      <b>${prof?.username || "user"}</b>
    </div>

    <div>${p.content}</div>
    ${p.image ? `<img src="${p.image}">` : ""}

    <div class="btn" onclick='like(${JSON.stringify(p)})'>❤️ Like</div>
    <div class="btn" onclick="follow('${p.user_id}')">👥 Follow</div>
  `;

  container.appendChild(el);
}

load();

</script>

</body>
</html>
