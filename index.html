<!DOCTYPE html>
<html>
<head>
  <title>Looply</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial; display:flex; background:#f2f2f2; }

    .sidebar {
      width:180px; height:100vh; background:#111; color:white;
      padding:10px; position:fixed;
    }

    .menu {
      padding:10px; background:#222; margin:10px 0; cursor:pointer;
      border-radius:5px;
    }

    .main { margin-left:190px; width:100%; padding:10px; }

    .page { display:none; }
    .active { display:block; }

    .post {
      background:white; padding:10px; margin:10px 0; border-radius:10px;
    }

    input, button {
      width:100%; padding:10px; margin-top:5px;
    }

    img { max-width:100%; border-radius:10px; margin-top:10px; }

    .actions { display:flex; gap:10px; margin-top:5px; }

    .btn {
      flex:1; padding:8px; text-align:center;
      cursor:pointer; border-radius:5px; background:#eee;
    }

    .liked { background:#ffd6d6; }
    .followed { background:#d6e6ff; }

    .comment {
      font-size:12px; background:#eee; padding:5px;
      margin-top:5px; border-radius:5px;
    }

    .loginBox {
      background:white; padding:10px; border-radius:10px;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Looply</h2>
  <div class="menu" onclick="show('explore')">Explore</div>
  <div class="menu" onclick="show('create')">Create</div>
  <div class="menu" onclick="show('following')">Following</div>
</div>

<div class="main">

  <!-- EXPLORE -->
  <div id="explore" class="page active">
    <h2>Explore</h2>
    <div id="feed"></div>
  </div>

  <!-- CREATE -->
  <div id="create" class="page">
    <h2>Create Post</h2>

    <div class="loginBox">
      <input id="user" placeholder="Username">
      <button onclick="setUser()">Set Username</button>
      <div id="status"></div>
    </div>

    <input id="text" placeholder="What's looping?">
    <input id="img" placeholder="Image URL (optional)">
    <button onclick="createPost()">Post</button>
  </div>

  <!-- FOLLOWING -->
  <div id="following" class="page">
    <h2>Following Feed</h2>
    <div id="followFeed"></div>
  </div>

</div>

<script>

const SUPABASE_URL = "https://vspsewltuwxtxgvvkfel.supabase.co";
const SUPABASE_KEY = "sb_publishable_uiKoJmabgcECsQkhQ_l6nA_Ll429aPH";

/* INIT SUPABASE */
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* STATE */
let currentUser = "";
let following = [];

/* SET USER */
function setUser(){
  currentUser = document.getElementById("user").value;
  document.getElementById("status").innerText =
    "Logged in as: " + currentUser;
}

/* NAV */
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  loadPosts();
}

/* CREATE POST */
async function createPost(){
  if(!currentUser) return alert("Set username first!");

  let text = document.getElementById("text").value;
  let img = document.getElementById("img").value;

  await client.from("posts").insert([{
    user_name: currentUser,
    content: text,
    image: img,
    likes: 0
  }]);

  document.getElementById("text").value = "";
  document.getElementById("img").value = "";

  loadPosts();
}

/* LIKE */
async function likePost(post){
  await client.from("posts")
    .update({ likes: post.likes + 1 })
    .eq("id", post.id);

  loadPosts();
}

/* FOLLOW */
function follow(user){
  if(following.includes(user)){
    following = following.filter(u=>u!==user);
  } else {
    following.push(user);
  }
  loadPosts();
}

/* LOAD POSTS */
async function loadPosts(){

  let { data: posts } = await client
    .from("posts")
    .select("*")
    .order("id", { ascending: false });

  render(posts || []);
}

/* RENDER */
function render(posts){

  feed.innerHTML = "";
  followFeed.innerHTML = "";

  posts.forEach(p=>{

    let el = document.createElement("div");
    el.className = "post";

    el.innerHTML = `
      <b>${p.user_name}</b>

      <div>${p.content}</div>
      ${p.image ? `<img src="${p.image}">` : ""}

      <div class="actions">
        <div class="btn" onclick='likePost(${JSON.stringify(p)})'>
          ❤️ ${p.likes}
        </div>

        <div class="btn" onclick="follow('${p.user_name}')">
          👥 Follow
        </div>
      </div>
    `;

    feed.appendChild(el);

    if(following.includes(p.user_name)){
      followFeed.appendChild(el.cloneNode(true));
    }
  });
}

/* AUTO LOAD */
loadPosts();

</script>

</body>
</html>
